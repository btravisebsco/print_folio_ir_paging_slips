<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange squircle background -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="#E8691B"/>

  <!-- Greater-than chevron lines — clipped to circle edges -->
